name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # ── JUCE: Standalone + VST3 ──────────────────────────────────────────
      - name: Configure JUCE
        working-directory: real-time/Plugin
        shell: powershell
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build JUCE Standalone + VST3
        working-directory: real-time/Plugin
        shell: powershell
        run: |
          cmake --build build --config Release --target AriaBridge_Standalone
          cmake --build build --config Release --target AriaBridge_VST3

      - name: Stage JUCE artifacts into dist
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $base = "real-time/Plugin/build/AriaBridge_artefacts/Release"
          Copy-Item "$base/Standalone/Aria Bridge.exe" "dist/Aria Bridge.exe" -Force
          Copy-Item "$base/VST3/Aria Bridge.vst3" "dist/Aria Bridge.vst3" -Recurse -Force

      # ── Python backend → aria_backend.exe ────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install -r real-time/requirements.txt --extra-index-url https://download.pytorch.org/whl/cu121

      - name: Build aria_backend.exe
        run: pyinstaller aria_backend.spec
        shell: powershell

      # aria_backend.exe already in dist/ from PyInstaller — no move needed

      # ── Electron launcher → AriaLauncher.exe ─────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache electron-builder binaries
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/electron-builder/cache
          key: electron-builder-win-${{ hashFiles('front-end/package-lock.json') }}
          restore-keys: electron-builder-win-

      - name: Install launcher dependencies
        working-directory: front-end
        run: npm install

      - name: Prepare resource folders for electron-builder
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path models   | Out-Null
          New-Item -ItemType Directory -Force -Path feedback | Out-Null

      - name: Build AriaLauncher.exe
        working-directory: front-end
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Package release zip ───────────────────────────────────────────────
      - name: Create release zip
        shell: powershell
        run: |
          $zip = "AriaBridge-${{ github.ref_name }}-windows.zip"
          $staging = "staging"
          New-Item -ItemType Directory -Force -Path "$staging/models"   | Out-Null
          New-Item -ItemType Directory -Force -Path "$staging/feedback" | Out-Null

          Copy-Item "dist/win-unpacked/*"          "$staging/"                   -Recurse -Force
          Copy-Item "real-time/ableton"            "$staging/ableton"            -Recurse -Force
          Copy-Item "README.md"                    "$staging/README.md"          -Force
          Set-Content "$staging/models/PUT_MODEL_HERE.txt" `
            "Download model-gen.safetensors from HuggingFace and place it in this folder."

          Compress-Archive -Path "$staging/*" -DestinationPath $zip

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: AriaBridge-${{ github.ref_name }}-windows.zip

  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      # ── JUCE: Standalone + VST3 ──────────────────────────────────────────
      - name: Configure JUCE
        working-directory: real-time/Plugin
        run: cmake -B build -G Xcode

      - name: Build JUCE Standalone + VST3
        working-directory: real-time/Plugin
        run: |
          cmake --build build --config Release --target AriaBridge_Standalone
          cmake --build build --config Release --target AriaBridge_VST3

      - name: Ad-hoc sign standalone
        working-directory: real-time/Plugin/build/AriaBridge_artefacts/Release/Standalone
        run: codesign --force --deep --sign - "Aria Bridge.app"

      - name: Stage JUCE artifacts into dist
        run: |
          mkdir -p dist
          cp -r "real-time/Plugin/build/AriaBridge_artefacts/Release/Standalone/Aria Bridge.app" "dist/Aria Bridge.app"
          cp -r "real-time/Plugin/build/AriaBridge_artefacts/Release/VST3/Aria Bridge.vst3" "dist/Aria Bridge.vst3"

      # ── Python backend → aria_backend ────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install -r real-time/requirements.txt

      - name: Build aria_backend
        run: pyinstaller aria_backend.spec

      - name: Mark aria_backend executable
        run: chmod +x dist/aria_backend

      # ── Electron launcher → AriaLauncher-mac.zip ─────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache electron-builder binaries
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron-builder
          key: electron-builder-mac-${{ hashFiles('front-end/package-lock.json') }}
          restore-keys: electron-builder-mac-

      - name: Install launcher dependencies
        working-directory: front-end
        run: npm install

      - name: Prepare resource folders for electron-builder
        run: |
          mkdir -p models feedback

      - name: Build AriaLauncher (mac)
        working-directory: front-end
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Package release zip ───────────────────────────────────────────────
      - name: Create release zip
        run: |
          ZIP="AriaBridge-${{ github.ref_name }}-macos.zip"
          STAGING="staging"
          mkdir -p "$STAGING/models"

          unzip dist/AriaLauncher-mac.zip -d "$STAGING"

          mkdir -p "$STAGING/feedback"
          cp -r "real-time/ableton" "$STAGING/ableton"
          cp README.md "$STAGING/README.md"
          printf "Download model-gen.safetensors from HuggingFace and place it in this folder." \
            > "$STAGING/models/PUT_MODEL_HERE.txt"

          cd "$STAGING"
          zip -r --symlinks "../$ZIP" .

      - uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: AriaBridge-${{ github.ref_name }}-macos.zip

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-mac]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: release-mac
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            AriaBridge-${{ github.ref_name }}-windows.zip
            AriaBridge-${{ github.ref_name }}-macos.zip
          body: See README.md for installation instructions.
