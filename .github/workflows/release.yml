name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # ── JUCE: Standalone + VST3 ──────────────────────────────────────────
      - name: Configure JUCE
        working-directory: real-time/Plugin
        shell: powershell
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build JUCE Standalone + VST3
        working-directory: real-time/Plugin
        shell: powershell
        run: |
          cmake --build build --config Release --target AriaBridge_Standalone
          cmake --build build --config Release --target AriaBridge_VST3

      - name: Stage JUCE artifacts
        shell: powershell
        run: |
          $base = "real-time/Plugin/build/AriaBridge_artefacts/Release"
          Copy-Item "$base/Standalone/Aria Bridge.exe" "Aria Bridge.exe" -Force
          Copy-Item "$base/VST3/Aria Bridge.vst3" "Aria Bridge.vst3" -Recurse -Force

      # ── Python backend → aria_backend.exe ────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r real-time/requirements.txt pyinstaller

      - name: Build aria_backend.exe
        run: |
          pyinstaller --onefile --name aria_backend `
            --paths real-time `
            real-time/ableton_bridge.py
        shell: powershell

      - name: Move aria_backend.exe to root
        shell: powershell
        run: Move-Item dist/aria_backend.exe aria_backend.exe -Force

      # ── Electron launcher → AriaLauncher.exe ─────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install launcher dependencies
        working-directory: front-end
        run: npm install

      - name: Build AriaLauncher.exe
        working-directory: front-end
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Package release zip ───────────────────────────────────────────────
      - name: Create release zip
        shell: powershell
        run: |
          $zip = "AriaBridge-${{ github.ref_name }}-windows.zip"
          $staging = "staging"
          New-Item -ItemType Directory -Force -Path "$staging/models" | Out-Null

          Copy-Item "dist/AriaLauncher.exe"        "$staging/AriaLauncher.exe"   -Force
          Copy-Item "aria_backend.exe"             "$staging/aria_backend.exe"   -Force
          Copy-Item "Aria Bridge.exe"              "$staging/Aria Bridge.exe"    -Force
          Copy-Item "Aria Bridge.vst3"             "$staging/Aria Bridge.vst3"   -Recurse -Force
          Copy-Item "real-time/ableton"            "$staging/ableton"            -Recurse -Force
          Copy-Item "README.md"                    "$staging/README.md"          -Force
          Set-Content "$staging/models/PUT_MODEL_HERE.txt" `
            "Download model-gen.safetensors from HuggingFace and place it in this folder."

          Compress-Archive -Path "$staging/*" -DestinationPath $zip

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: AriaBridge-${{ github.ref_name }}-windows.zip

  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        working-directory: real-time/Plugin
        run: cmake -B build -G Xcode

      - name: Build
        working-directory: real-time/Plugin
        run: cmake --build build --config Release --target AriaBridge_Standalone

      - name: Ad-hoc sign
        working-directory: real-time/Plugin/build/AriaBridge_artefacts/Release/Standalone
        run: codesign --force --deep --sign - "Aria Bridge.app"

      - name: Zip app bundle
        working-directory: real-time/Plugin/build/AriaBridge_artefacts/Release/Standalone
        run: ditto -c -k --sequesterRsrc --keepParent "Aria Bridge.app" "Aria Bridge.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: standalone-mac
          path: real-time/Plugin/build/AriaBridge_artefacts/Release/Standalone/Aria Bridge.zip

  package-mac:
    runs-on: macos-latest
    needs: build-mac

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: standalone-mac
          path: app-download

      - name: Build package structure
        run: |
          mkdir -p staging/models staging/backend

          ditto -x -k "app-download/Aria Bridge.zip" staging/

          cp start.sh "staging/Aria Bridge.app/Contents/MacOS/start.sh"
          chmod +x "staging/Aria Bridge.app/Contents/MacOS/start.sh"

          cp install.sh staging/install.sh
          chmod +x staging/install.sh
          cp README.md staging/README.md
          printf "Download model-gen.safetensors from https://huggingface.co/eleutherai/aria and place it in this folder." \
            > "staging/models/PUT_MODEL_HERE.txt"

          find real-time -maxdepth 1 -mindepth 1 | while read -r item; do
            name=$(basename "$item")
            if [[ "$name" != "Plugin" && "$name" != "build" && "$name" != "__pycache__" ]]; then
              cp -r "$item" staging/backend/
            fi
          done

          cp -r aria staging/backend/aria
          cp -r config staging/backend/config

      - name: Zip
        run: |
          cd staging
          zip -r --symlinks "../aria-bridge-macos-${{ github.ref_name }}.zip" .

      - uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: aria-bridge-macos-${{ github.ref_name }}.zip

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, package-mac]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: release-mac
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            AriaBridge-${{ github.ref_name }}-windows.zip
            aria-bridge-macos-${{ github.ref_name }}.zip
          body: See README.md for installation instructions.
